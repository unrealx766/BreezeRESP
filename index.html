<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/breezeresp.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>BreezeRESP for Redis</title>
    <meta name="author" content="unrealx766" />
    <meta name="copyright" content="Copyright © 2026 unrealx766. All Rights Reserved." />
    <style>
      .splash-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f8f9fb;
        z-index: 99999;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      .splash-screen.splash-hidden {
        opacity: 0;
        visibility: hidden;
      }
      .splash-logo {
        width: 64px;
        height: 64px;
        animation: splash-bounce 1.2s ease-in-out infinite;
      }
      .splash-title {
        margin-top: 20px;
        font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
        font-size: 18px;
        font-weight: 600;
        color: #1a1f36;
        letter-spacing: 0.02em;
      }
      .splash-bar-track {
        margin-top: 24px;
        width: 180px;
        height: 3px;
        border-radius: 3px;
        background: #e2e6ef;
        overflow: hidden;
      }
      .splash-bar-fill {
        width: 40%;
        height: 100%;
        border-radius: 3px;
        background: linear-gradient(90deg, #DC382D, #a82a22);
        animation: splash-slide 1.2s ease-in-out infinite;
      }
      /* Dark mode splash */
      .dark .splash-screen { background: #0f1117; }
      .dark .splash-title { color: #e4e7f1; }
      .dark .splash-bar-track { background: #2a2d42; }
      @keyframes splash-bounce {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.08); opacity: 1; }
      }
      @keyframes splash-slide {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(150%); }
        100% { transform: translateX(350%); }
      }
    </style>
  </head>

  <body>
    <script>
      // Early theme initialization to prevent flash
      (function() {
        var theme = localStorage.getItem('breezeresp-theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="app"></div>
    <div class="splash-screen" id="splash-screen">
      <svg class="splash-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#DC382D"/><stop offset="100%" stop-color="#a82a22"/></linearGradient></defs><rect width="128" height="128" rx="28" fill="url(#bg)"/><path d="M 92,12 C 76,44 56,76 28,116" stroke="#fff" stroke-width="3.5" stroke-linecap="round" fill="none"/><path d="M 92,12 C 88,16 78,22 68,34 C 54,50 42,68 36,86 C 32,98 36,104 42,100 C 50,94 60,76 72,56 C 82,40 90,24 92,12 Z" fill="#fff"/><path d="M 72,38 L 60,52" stroke="#DC382D" stroke-width="1.2" stroke-linecap="round" opacity="0.18"/><path d="M 62,52 L 50,66" stroke="#DC382D" stroke-width="1.2" stroke-linecap="round" opacity="0.15"/><path d="M 52,66 L 42,78" stroke="#DC382D" stroke-width="1.2" stroke-linecap="round" opacity="0.12"/><path d="M 18,38 C 26,36 34,38 42,36" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/><path d="M 12,52 C 20,50 28,52 36,50" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.3"/><path d="M 16,66 C 22,64 28,66 32,64" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.2"/><path d="M 86,48 C 94,46 102,48 110,46" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/><path d="M 82,62 C 90,60 98,62 106,60" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.3"/><path d="M 76,76 C 82,74 88,76 94,74" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.2"/></svg>
      <div class="splash-title">BreezeRESP</div>
      <div class="splash-bar-track">
        <div class="splash-bar-fill"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
